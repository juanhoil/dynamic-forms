<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InputVars</title>
<style>
  :root {
    color-scheme: light dark;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --font-sans: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;

    --bg: #0e1116;
    --panel: #161a21;
    --border: #2a2f3a;
    --border-focus: #5b8def;
    --text: #d3d7de;
    --text-dim: #828a99;
    --text-bright: #f3f5f8;
    --placeholder: #565d6b;
    --btn-bg: #1e232c;
    --btn-bg-hover: #262c37;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --border: #d8dce3;
      --border-focus: #3b6fd6;
      --text: #1d2127;
      --text-dim: #6b7280;
      --text-bright: #0b0d12;
      --placeholder: #9aa1ad;
      --btn-bg: #f0f1f4;
      --btn-bg-hover: #e5e7eb;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--text);
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 96px;
  }

  .page h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-bright);
    margin: 0 0 36px;
  }

  .demo-block { margin-bottom: 32px; }

  /* ---------- label + description ---------- */

  .iv-root { width: 100%; }

  .iv-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 2px;
  }

  .iv-description {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  /* ---------- editor frame ---------- */

  .iv-frame {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.12s ease;
  }

  .iv-frame:focus-within {
    border-color: var(--border-focus);
  }

  .iv-frame.is-disabled {
    opacity: 0.55;
  }

  /* The editable area reserves right-side padding so the trigger button
     never overlaps wrapped text or the last token. */
  .iv-editor {
    font-family: var(--font-mono);
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    outline: none;
    white-space: pre-wrap;
    word-break: break-word;
    cursor: text;
    padding: 9px 12px;
  }

  .iv-editor[data-type="input"] {
    padding-right: 118px;
    min-height: 38px;
    max-height: 38px;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    align-items: center;
    flex-wrap: nowrap;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .iv-editor[data-type="input"]::-webkit-scrollbar { display: none; }

  .iv-editor[data-type="textarea"] {
    min-height: 84px;
    max-height: 280px;
    overflow-y: auto;
    padding: 11px 12px;
  }

  .iv-frame[data-mode="textarea"] {
    display: flex;
    flex-direction: column;
  }

  .iv-frame[data-mode="textarea"] .iv-editor {
    flex: 1;
  }

  .iv-footer {
    display: flex;
    justify-content: flex-end;
    border-top: 1px solid var(--border);
    padding: 5px;
  }

  .iv-editor:empty::before {
    content: attr(data-placeholder);
    color: var(--placeholder);
    pointer-events: none;
  }

  /* ---------- "+ Variable" trigger, docked inside the frame ---------- */

  .iv-menu-wrap {
    position: relative;
  }

  /* input mode: trigger floats absolute, vertically centered on the right edge */
  .iv-frame[data-mode="input"] .iv-menu-wrap {
    position: absolute;
    top: 50%;
    right: 6px;
    transform: translateY(-50%);
  }

  /* textarea mode: trigger sits in normal flow inside the footer row */
  .iv-frame[data-mode="textarea"] .iv-menu-wrap {
    display: inline-flex;
  }

  .iv-trigger {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--text-dim);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    padding: 0 9px;
    height: 26px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  .iv-trigger:hover {
    background: var(--btn-bg-hover);
    color: var(--text-bright);
  }

  .iv-trigger:disabled { cursor: not-allowed; opacity: 0.6; }

  .iv-trigger .iv-caret {
    font-size: 9px;
    transform: translateY(0.5px);
    opacity: 0.7;
  }

  /* ---------- token (chip) ---------- */

  .iv-token {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    height: 20px;
    padding: 0 7px 0 6px;
    margin: 0 1px;
    border-radius: 4px;
    background: var(--iv-chip-bg, rgba(91,141,239,0.16));
    border: 1px solid var(--iv-chip-border, rgba(91,141,239,0.45));
    color: var(--iv-chip-color, #5b8def);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    vertical-align: -3px;
    user-select: none;
    cursor: default;
    white-space: nowrap;
  }

  .iv-token-dot {
    width: 5px;
    height: 5px;
    border-radius: 999px;
    background: var(--iv-chip-color, #5b8def);
    flex-shrink: 0;
  }

  /* ---------- dropdown menu ---------- */

  .iv-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    width: 240px;
    max-height: 280px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.3);
    padding: 6px;
    z-index: 20;
  }

  .iv-menu[hidden] { display: none; }

  .iv-menu-group-label {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    padding: 6px 8px 3px;
  }

  .iv-menu-item {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: none;
    border-radius: 5px;
    padding: 6px 8px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
  }

  .iv-menu-item:hover { background: rgba(127,127,127,0.12); }

  .iv-menu-item .iv-swatch {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    flex-shrink: 0;
  }

  /* ---------- output preview (demo only) ---------- */

  .iv-output {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .iv-output strong { color: var(--text-bright); font-weight: 600; }
</style>
</head>
<body>

<div class="page">
  <h1>InputVars</h1>

  <div class="demo-block" id="demo-url"></div>
  <div class="demo-block" id="demo-message"></div>
</div>

<script>
(function () {
  "use strict";

  /* =======================================================================
   * 1) Parseo y serialización (sin cambios respecto a la versión probada)
   * ===================================================================== */

  var TOKEN_PATTERN = /\{\{[^{}]+\}\}/g;

  function parseValue(value, vars) {
    if (!value) return [];
    var byValue = {};
    vars.forEach(function (v) { byValue[v.value] = v; });

    var segments = [];
    var lastIndex = 0;
    var match;

    TOKEN_PATTERN.lastIndex = 0;
    while ((match = TOKEN_PATTERN.exec(value)) !== null) {
      var raw = match[0];
      var variable = byValue[raw];
      if (!variable) continue;

      if (match.index > lastIndex) {
        segments.push({ kind: "text", text: value.slice(lastIndex, match.index) });
      }
      segments.push({ kind: "token", raw: raw, variable: variable });
      lastIndex = match.index + raw.length;
    }
    if (lastIndex < value.length) {
      segments.push({ kind: "text", text: value.slice(lastIndex) });
    }
    return segments;
  }

  function serializeEditor(root) {
    var out = "";
    function walk(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        out += node.textContent || "";
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;
      var el = node;

      if (el.dataset && el.dataset.ivToken === "true") {
        out += el.dataset.ivValue || "";
        return;
      }
      if (el.tagName === "BR") { out += "\n"; return; }

      var isBlock = el.tagName === "DIV" || el.tagName === "P";
      var isFirstBlockChild = isBlock && el.previousSibling !== null;
      if (isFirstBlockChild) out += "\n";

      var children = el.childNodes;
      for (var i = 0; i < children.length; i++) walk(children[i]);
    }
    var rootChildren = root.childNodes;
    for (var i = 0; i < rootChildren.length; i++) walk(rootChildren[i]);
    return out;
  }

  /* =======================================================================
   * 2) Color helpers
   * ===================================================================== */

  var DEFAULT_COLOR = "#5B8DEF";

  function normalizeHex(color) {
    if (!color) return DEFAULT_COLOR;
    var hex = color.trim();
    var shortMatch = /^#([0-9a-fA-F]{3})$/.exec(hex);
    if (shortMatch) {
      var c = shortMatch[1].split("");
      return "#" + c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
    }
    if (/^#([0-9a-fA-F]{6})$/.test(hex)) return hex;
    return DEFAULT_COLOR;
  }

  function hexToRgb(hex) {
    var n = normalizeHex(hex);
    return [parseInt(n.slice(1, 3), 16), parseInt(n.slice(3, 5), 16), parseInt(n.slice(5, 7), 16)];
  }

  function applyChipColor(el, color) {
    var base = normalizeHex(color);
    var rgb = hexToRgb(base);
    el.style.setProperty("--iv-chip-color", base);
    el.style.setProperty("--iv-chip-bg", "rgba(" + rgb[0] + ", " + rgb[1] + ", " + rgb[2] + ", 0.16)");
    el.style.setProperty("--iv-chip-border", "rgba(" + rgb[0] + ", " + rgb[1] + ", " + rgb[2] + ", 0.45)");
  }

  /* =======================================================================
   * 3) Construcción de nodos DOM
   * ===================================================================== */

  function buildTokenElement(variable) {
    var span = document.createElement("span");
    span.setAttribute("contenteditable", "false");
    span.setAttribute("data-iv-token", "true");
    span.setAttribute("data-iv-value", variable.value);
    span.setAttribute("draggable", "true");
    span.setAttribute("role", "img");
    span.setAttribute("aria-label", "Variable: " + variable.label);
    span.className = "iv-token";

    applyChipColor(span, variable.color);

    var dot = document.createElement("span");
    dot.className = "iv-token-dot";
    dot.setAttribute("aria-hidden", "true");
    span.appendChild(dot);

    var label = document.createElement("span");
    label.textContent = variable.label;
    span.appendChild(label);

    return span;
  }

  function renderSegmentsInto(root, segments) {
    root.replaceChildren();
    if (!segments.length) return;
    segments.forEach(function (seg) {
      if (seg.kind === "text") {
        var lines = seg.text.split("\n");
        lines.forEach(function (line, i) {
          if (line.length > 0) root.appendChild(document.createTextNode(line));
          if (i < lines.length - 1) root.appendChild(document.createElement("br"));
        });
      } else {
        root.appendChild(buildTokenElement(seg.variable));
      }
    });
  }

  /* =======================================================================
   * 4) Inserción en el caret
   * ===================================================================== */

  function placeCaretAfter(node) {
    var selection = window.getSelection();
    if (!selection) return;
    var range = document.createRange();
    range.setStartAfter(node);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
  }

  function scrollNodeIntoView(node) {
    if (node && typeof node.scrollIntoView === "function") {
      node.scrollIntoView({ block: "nearest", inline: "nearest" });
    }
  }

  function insertVariableAtCaret(root, variable) {
    var selection = window.getSelection();
    var token = buildTokenElement(variable);

    var hasSelectionInRoot =
      selection && selection.rangeCount > 0 &&
      root.contains(selection.getRangeAt(0).commonAncestorContainer);

    if (!hasSelectionInRoot) {
      root.appendChild(token);
      placeCaretAfter(token);
      return token;
    }

    var range = selection.getRangeAt(0);
    range.deleteContents();
    range.insertNode(token);
    placeCaretAfter(token);
    return token;
  }

  /* =======================================================================
   * 5) Backspace/Delete sobre tokens adyacentes
   * ===================================================================== */

  function isToken(node) {
    return !!(node && node.nodeType === Node.ELEMENT_NODE && node.dataset && node.dataset.ivToken === "true");
  }

  function handleTokenAdjacentDeletion(root, event) {
    if (event.key !== "Backspace" && event.key !== "Delete") return false;

    var selection = window.getSelection();
    if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) return false;

    var range = selection.getRangeAt(0);
    if (!root.contains(range.startContainer)) return false;

    var container = range.startContainer;
    var offset = range.startOffset;
    var targetToken = null;

    if (event.key === "Backspace") {
      if (container.nodeType === Node.TEXT_NODE && offset === 0) {
        targetToken = isToken(container.previousSibling) ? container.previousSibling : null;
      } else if (container.nodeType === Node.ELEMENT_NODE) {
        var prevChild = container.childNodes[offset - 1];
        targetToken = isToken(prevChild) ? prevChild : null;
      }
    } else {
      var textLen = container.nodeType === Node.TEXT_NODE ? (container.textContent || "").length : -1;
      if (container.nodeType === Node.TEXT_NODE && offset === textLen) {
        targetToken = isToken(container.nextSibling) ? container.nextSibling : null;
      } else if (container.nodeType === Node.ELEMENT_NODE) {
        var nextChild = container.childNodes[offset];
        targetToken = isToken(nextChild) ? nextChild : null;
      }
    }

    if (!targetToken) return false;

    event.preventDefault();
    var toFocus = targetToken.previousSibling;
    targetToken.remove();

    var newRange = document.createRange();
    if (toFocus) newRange.setStartAfter(toFocus);
    else newRange.setStart(root, 0);
    newRange.collapse(true);
    selection.removeAllRanges();
    selection.addRange(newRange);

    return true;
  }

  /* =======================================================================
   * 6) Trigger "+ Variable" con menú desplegable, anclado al borde derecho
   * ===================================================================== */

  function buildVariableMenu(vars, onPick) {
    var trigger = document.createElement("button");
    trigger.type = "button";
    trigger.className = "iv-trigger";
    trigger.innerHTML = "+ Variable <span class=\"iv-caret\">▾</span>";

    var menu = document.createElement("div");
    menu.className = "iv-menu";
    menu.setAttribute("role", "listbox");
    menu.hidden = true;

    var groups = {};
    var order = [];
    vars.forEach(function (v) {
      var key = (v.color || DEFAULT_COLOR).toUpperCase();
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(v);
    });

    order.forEach(function (key) {
      groups[key].forEach(function (v) {
        var item = document.createElement("button");
        item.type = "button";
        item.className = "iv-menu-item";

        var swatch = document.createElement("span");
        swatch.className = "iv-swatch";
        swatch.style.background = normalizeHex(v.color);
        item.appendChild(swatch);

        var label = document.createElement("span");
        label.textContent = v.label;
        item.appendChild(label);

        item.addEventListener("mousedown", function (e) {
          e.preventDefault(); // no perder el foco/caret del editor
          onPick(v);
          closeMenu();
        });

        menu.appendChild(item);
      });
    });

    function openMenu() {
      menu.hidden = false;
      document.addEventListener("mousedown", onOutsideClick, true);
    }
    function closeMenu() {
      menu.hidden = true;
      document.removeEventListener("mousedown", onOutsideClick, true);
    }
    function onOutsideClick(e) {
      if (!trigger.contains(e.target) && !menu.contains(e.target)) closeMenu();
    }

    trigger.addEventListener("click", function () {
      if (menu.hidden) openMenu(); else closeMenu();
    });

    return { trigger: trigger, menu: menu, close: closeMenu };
  }

  /* =======================================================================
   * 7) Componente público: createInputVars(container, props)
   * ===================================================================== */

  function createInputVars(container, props) {
    props = props || {};
    var type = props.type === "textarea" ? "textarea" : "input";
    var vars = props.vars || [];
    var placeholder = props.placeholder || "";
    var disabled = !!props.disabled;
    var onChange = typeof props.onChange === "function" ? props.onChange : function () {};
    var showOutputPreview = props.showOutputPreview !== false;

    var root = document.createElement("div");
    root.className = "iv-root";

    if (props.label) {
      var labelEl = document.createElement("label");
      labelEl.className = "iv-label";
      labelEl.textContent = props.label;
      if (props.id) labelEl.htmlFor = props.id;
      root.appendChild(labelEl);
    }

    if (props.description) {
      var descEl = document.createElement("div");
      descEl.className = "iv-description";
      descEl.textContent = props.description;
      root.appendChild(descEl);
    }

    var frame = document.createElement("div");
    frame.className = "iv-frame" + (disabled ? " is-disabled" : "");
    frame.dataset.mode = type;

    var editor = document.createElement("div");
    editor.className = "iv-editor";
    editor.dataset.type = type;
    editor.dataset.placeholder = placeholder;
    editor.setAttribute("contenteditable", disabled ? "false" : "true");
    editor.setAttribute("role", "textbox");
    editor.setAttribute("aria-multiline", type === "textarea" ? "true" : "false");
    if (props.ariaLabel) editor.setAttribute("aria-label", props.ariaLabel);
    if (props.id) editor.id = props.id;

    var menuApi = buildVariableMenu(vars, function (variable) {
      editor.focus();
      var inserted = insertVariableAtCaret(editor, variable);
      scrollNodeIntoView(inserted);
      emitChange();
    });
    menuApi.trigger.disabled = disabled;

    var menuWrap = document.createElement("div");
    menuWrap.className = "iv-menu-wrap";
    menuWrap.appendChild(menuApi.trigger);
    menuWrap.appendChild(menuApi.menu);

    frame.appendChild(editor);

    if (type === "textarea") {
      var footer = document.createElement("div");
      footer.className = "iv-footer";
      footer.appendChild(menuWrap);
      frame.appendChild(footer);
    } else {
      frame.appendChild(menuWrap);
    }

    root.appendChild(frame);

    var outputPreview = null;
    if (showOutputPreview) {
      outputPreview = document.createElement("div");
      outputPreview.className = "iv-output";
      root.appendChild(outputPreview);
    }

    function renderOutputPreview(text) {
      if (!outputPreview) return;
      outputPreview.innerHTML = "";
      var label = document.createElement("strong");
      label.textContent = "value: ";
      outputPreview.appendChild(label);
      outputPreview.appendChild(document.createTextNode(JSON.stringify(text)));
    }

    function emitChange() {
      var text = serializeEditor(editor);
      renderOutputPreview(text);
      onChange(text);
    }

    function setValue(value) {
      var segments = parseValue(value || "", vars);
      renderSegmentsInto(editor, segments);
      renderOutputPreview(serializeEditor(editor));
    }

    setValue(props.value || "");

    editor.addEventListener("input", emitChange);

    editor.addEventListener("keydown", function (event) {
      handleTokenAdjacentDeletion(editor, event);
      if (type === "input" && event.key === "Enter") event.preventDefault();
    });

    editor.addEventListener("paste", function (event) {
      event.preventDefault();
      var text = (event.clipboardData || window.clipboardData).getData("text/plain");
      if (type === "input") text = text.replace(/\r?\n/g, " ");
      document.execCommand("insertText", false, text);
    });

    function onSelectionChange() {
      var selection = window.getSelection();
      if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) return;
      var range = selection.getRangeAt(0);
      if (!editor.contains(range.startContainer)) return;

      var container = range.startContainer;
      var offset = range.startOffset;
      var adjacentToken = null;

      if (container.nodeType === Node.TEXT_NODE) {
        if (offset === 0) adjacentToken = isToken(container.previousSibling) ? container.previousSibling : null;
        else if (offset === container.textContent.length) {
          adjacentToken = isToken(container.nextSibling) ? container.nextSibling : null;
        }
      } else if (container.nodeType === Node.ELEMENT_NODE) {
        var beforeChild = container.childNodes[offset - 1];
        var afterChild = container.childNodes[offset];
        if (isToken(beforeChild)) adjacentToken = beforeChild;
        else if (isToken(afterChild)) adjacentToken = afterChild;
      }

      if (adjacentToken) scrollNodeIntoView(adjacentToken);
    }
    document.addEventListener("selectionchange", onSelectionChange);

    container.appendChild(root);

    return {
      getValue: function () { return serializeEditor(editor); },
      setValue: setValue,
      focus: function () { editor.focus(); },
      destroy: function () {
        document.removeEventListener("selectionchange", onSelectionChange);
        root.remove();
      }
    };
  }

  /* =======================================================================
   * 8) Demo
   * ===================================================================== */

  var urlVars = [
    { label: "Form {{CP}}", value: "{{CP}}", color: "#2563EB" },
    { label: "Form {{Ciudad}}", value: "{{Ciudad}}", color: "#2563EB" },
    { label: "Form {{Estado}}", value: "{{Estado}}", color: "#2563EB" },
    { label: "Form {{polizaId}}", value: "{{polizaId}}", color: "#2563EB" },
    { label: "External {{id}}", value: "{{id}}", color: "#16A34A" }
  ];

  var messageVars = urlVars.concat([
    { label: "Form {{nombre}}", value: "{{nombre}}", color: "#2563EB" }
  ]);

  createInputVars(document.getElementById("demo-url"), {
    label: "Endpoint",
    type: "input",
    value: "https://api.com/users/{{id}}",
    vars: urlVars,
    placeholder: "https://api.com/users/...",
    onChange: function (text) { console.log("[endpoint] onChange:", text); }
  });

  createInputVars(document.getElementById("demo-message"), {
    label: "Guiño",
    description: "Escribe el mensaje que recibirá el usuario.",
    type: "textarea",
    value: "Hola {{nombre}}, tu póliza es {{polizaId}}.",
    vars: messageVars,
    placeholder: "Hola {{nombre}}, ...",
    onChange: function (text) { console.log("[guiño] onChange:", text); }
  });

  window.InputVarsVanilla = {
    create: createInputVars,
    parseValue: parseValue,
    serializeEditor: serializeEditor
  };
})();
</script>

</body>
</html>
